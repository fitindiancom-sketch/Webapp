kind = "web"
previewPath = "/"
title = "NutriCare — Dietitian Management"
version = "1.0.0"
id = "artifacts/nutricare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19366

[services.development]
run = "pnpm --filter @workspace/nutricare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutricare", "run", "build" ]
publicDir = "artifacts/nutricare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19366"
BASE_PATH = "/"
